###########################################################
### Mama AI — Data Governance, AI Safety & Ethics
### Website configuration for Christabel Chomba
###########################################################

############################
# --- Required options --- #
############################

title: Mama AI
author: Christabel Chomba

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Home: ""
  About: "about"
  Services: "services"
  Insights: "blog"
  Speaking: "speaking"
  Contact: "contact"

################
# --- Logo --- #
################

avatar: "/assets/img/avatar.jpg"
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "christabel@mamaai.africa"
  linkedin: "christabel-chomba"
  twitter: "MamaAIAfrica"
  github: marvellabel
#  instagram: yourname
#  whatsapp: 254700000000

rss-description: "Mama AI — Insights on Data Governance, AI Safety, Ethics, and Data Privacy from Nairobi, Kenya."

###########################
# --- General options --- #
###########################

share-links-active:
  twitter: true
  facebook: false
  linkedin: true
  vk: false
  reddit: false

url-pretty: "mamaai.africa"

title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: false
navbar-var-length: true

keywords: "data governance, AI safety, AI ethics, data privacy, Kenya Data Protection Act, GDPR, monitoring evaluation, Africa, Nairobi"

######################################
# --- Colours / background image --- #
######################################

page-col: "#FAF8F4"
text-col: "#2C2C2C"
link-col: "#C1440E"
hover-col: "#1B4332"
navbar-col: "#1B4332"
navbar-text-col: "#F5F0E8"
navbar-border-col: "#143326"
footer-col: "#1B4332"
footer-text-col: "#C8D8C8"
footer-link-col: "#F5F0E8"
footer-hover-col: "#D4A017"

mobile-theme-col: "#1B4332"

site-css:
  - "/assets/css/mama-ai-custom.css"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"
timezone: "Africa/Nairobi"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

